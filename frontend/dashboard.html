<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Proof of Skill</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar glass">
        <a href="index.html" class="logo">ProofOfSkill</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="submit.html">Submit Work</a>
            <a href="review.html">Review</a>
            <span id="walletStatus">Not Connected</span>
            <button class="btn btn-primary" id="connectWalletBtn">Connect Wallet</button>
        </div>
    </nav>
    
    <div class="container">
        <div class="glass" style="padding: 2rem; margin-bottom: 2rem;">
            <h2>User Dashboard</h2>
            <p>Wallet: <span id="dashWallet" style="color:var(--primary); font-family:monospace;">Not connected</span></p>
            <p>Reputation Score: <span id="dashReputation" class="badge badge-approved" style="font-size: 1rem;">0</span></p>
        </div>

        <h3>My Submitted Projects</h3>
        <div class="grid" id="projectsGrid">
            <p style="color:var(--text-muted);">Connect wallet to view projects.</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('walletConnected', async (e) => {
            document.getElementById('dashWallet').innerText = e.detail.address;
            loadUserData(e.detail.address);
        });

        async function loadUserData(address) {
            try {
                const res = await fetch(`${API_URL}/user/${address}`);
                if (!res.ok) {
                    if(res.status === 404) {
                        document.getElementById('projectsGrid').innerHTML = '<p>No projects found.</p>';
                        return;
                    }
                    throw new Error("Failed to fetch user data");
                }
                const data = await res.json();
                document.getElementById('dashReputation').innerText = data.reputation || 0;
                
                const grid = document.getElementById('projectsGrid');
                grid.innerHTML = '';
                if(data.projects && data.projects.length > 0) {
                    data.projects.forEach(p => {
                        let badgeClass = 'badge-pending';
                        if(p.status === 'approved') badgeClass = 'badge-approved';
                        if(p.status === 'rejected') badgeClass = 'badge-rejected';

                        grid.innerHTML += `
                            <div class="card glass">
                                <h3>${p.title}</h3>
                                <span class="badge ${badgeClass}">${p.status}</span>
                                <p style="margin-top: 1rem;">Skill: ${p.skill_category}</p>
                                <p>IPFS Hash: <small style="color:var(--text-muted);">${p.ipfs_hash.substring(0, 20)}...</small></p>
                            </div>
                        `;
                    });
                } else {
                    grid.innerHTML = '<p>No projects submitted yet.</p>';
                }

            } catch(e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
