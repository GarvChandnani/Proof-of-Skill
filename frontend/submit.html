<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Work - Proof of Skill</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar glass">
        <a href="index.html" class="logo">ProofOfSkill</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="submit.html">Submit Work</a>
            <a href="review.html">Review</a>
            <span id="walletStatus">Not Connected</span>
            <button class="btn btn-primary" id="connectWalletBtn">Connect Wallet</button>
        </div>
    </nav>
    
    <div class="container">
        <div class="glass" style="max-width: 600px; margin: 0 auto; padding: 2rem;">
            <h2>Submit Proof of Work</h2>
            <p style="margin-bottom: 2rem; color: var(--text-muted);">Submit your project for peer review to earn a verified Skill NFT.</p>
            
            <form id="submitForm">
                <div class="form-group">
                    <label for="title">Project Title</label>
                    <input type="text" id="title" required>
                </div>
                
                <div class="form-group">
                    <label>Skill Categories (Add Multiple)</label>
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                        <input type="text" id="skillInput" placeholder="Enter a skill (e.g. Solidity)">
                        <button type="button" id="addSkillBtn" class="btn btn-secondary">Add</button>
                    </div>
                    <div id="skillsTagContainer" style="display: flex; flex-wrap: wrap; gap: 0.5rem; min-height: 20px;">
                        <!-- Tags will appear here -->
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Project Description / PR Link</label>
                    <textarea id="description" rows="4" required placeholder="Describe your work or link to a GitHub repository"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Submit for Review</button>
            </form>
            <div id="submitMsg" style="margin-top: 1rem; text-align: center; color: var(--secondary);"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        const addedSkills = [];
        const skillInput = document.getElementById('skillInput');
        const addSkillBtn = document.getElementById('addSkillBtn');
        const tagContainer = document.getElementById('skillsTagContainer');

        function updateTags() {
            tagContainer.innerHTML = '';
            addedSkills.forEach((skill, index) => {
                const tag = document.createElement('span');
                tag.className = 'badge badge-pending';
                tag.style.display = 'flex';
                tag.style.alignItems = 'center';
                tag.style.gap = '5px';
                tag.innerHTML = `${skill} <span style="cursor:pointer; font-weight:bold;" onclick="removeSkill(${index})">&times;</span>`;
                tagContainer.appendChild(tag);
            });
        }

        function addSkill() {
            const val = skillInput.value.trim();
            if(val && !addedSkills.includes(val)) {
                addedSkills.push(val);
                skillInput.value = '';
                updateTags();
            }
        }

        addSkillBtn.addEventListener('click', addSkill);
        skillInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                e.preventDefault();
                addSkill();
            }
        });

        window.removeSkill = (index) => {
            addedSkills.splice(index, 1);
            updateTags();
        };

        document.getElementById('submitForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!userWalletAddress) {
                alert("Please connect your wallet first.");
                return;
            }

            if(addedSkills.length === 0) {
                alert("Please add at least one skill.");
                return;
            }

            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const msgEl = document.getElementById('submitMsg');
            
            msgEl.innerText = "Submitting...";

            try {
                const res = await fetch(`${API_URL}/submit-project`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        title, 
                        skill_category: addedSkills, 
                        description, 
                        user_id: userWalletAddress
                    })
                });
                
                const data = await res.json();
                if(data.success) {
                    msgEl.innerText = `Submitted successfully! Simulated IPFS Hash: ${data.ipfs_hash}`;
                    document.getElementById('submitForm').reset();
                    addedSkills.length = 0;
                    updateTags();
                } else {
                    msgEl.innerText = "Error: " + data.error;
                }
            } catch (err) {
                console.error(err);
                msgEl.innerText = "Failed to communicate with server.";
            }
        });
    </script>
</body>
</html>
