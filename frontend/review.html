<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Submissions - Proof of Skill</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar glass">
        <a href="index.html" class="logo">ProofOfSkill</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="submit.html">Submit Work</a>
            <a href="review.html">Review</a>
            <span id="walletStatus">Not Connected</span>
            <button class="btn btn-primary" id="connectWalletBtn">Connect Wallet</button>
        </div>
    </nav>
    
    <div class="container">
        <h2>Pending Submissions</h2>
        <p style="color:var(--text-muted); margin-bottom: 2rem;">Review work from your peers. Honest and accurate reviews maintain your reputation score.</p>
        
        <div class="grid" id="pendingGrid">
            <!-- Populated via JS -->
        </div>
    </div>

    <!-- Review Modal Overlay (hidden by default) -->
    <div id="reviewModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
        <div class="glass" style="max-width: 500px; width:100%; padding: 2rem; position:relative;">
            <button id="closeModal" style="position:absolute; top:1rem; right:1rem; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
            <h3 id="modalTitle">Review Project</h3>
            <form id="reviewForm" style="margin-top: 1.5rem;">
                <input type="hidden" id="modalProjectId">
                
                <div class="form-group">
                    <label for="score">Score Out of 5</label>
                    <input type="number" id="score" min="1" max="5" required>
                </div>

                <div class="form-group">
                    <label for="feedback">Feedback</label>
                    <textarea id="feedback" rows="3" required></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width:100%;">Submit Review</button>
            </form>
            <div id="reviewMsg" style="margin-top: 1rem; text-align: center; color: var(--secondary);"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('walletConnected', loadPendingProjects);

        async function loadPendingProjects() {
            try {
                const res = await fetch(`${API_URL}/projects?status=pending`);
                const data = await res.json();
                const grid = document.getElementById('pendingGrid');
                grid.innerHTML = '';
                
                if(data.projects && data.projects.length > 0) {
                    data.projects.forEach(p => {
                        // Users shouldn't review their own project
                        if (p.user_id !== userWalletAddress) {
                            grid.innerHTML += `
                                <div class="card glass">
                                    <h3>${p.title}</h3>
                                    <p>Skill: ${p.skill_category}</p>
                                    <p style="margin: 0.5rem 0;">${p.description}</p>
                                    <button class="btn btn-secondary w-100 mt-2" onclick="openReviewModal(${p.id}, '${p.title}')">Review</button>
                                </div>
                            `;
                        }
                    });
                    if(grid.innerHTML === '') grid.innerHTML = '<p>No eligible pending projects to review.</p>';
                } else {
                    grid.innerHTML = '<p>No pending projects found.</p>';
                }
            } catch(e) {
                console.error(e);
            }
        }

        const modal = document.getElementById('reviewModal');
        function openReviewModal(id, title) {
            if(!userWalletAddress) {
                alert("Please connect wallet first.");
                return;
            }
            document.getElementById('modalProjectId').value = id;
            document.getElementById('modalTitle').innerText = `Review: ${title}`;
            modal.style.display = 'flex';
        }

        document.getElementById('closeModal').onclick = () => {
            modal.style.display = 'none';
        }

        document.getElementById('reviewForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const project_id = document.getElementById('modalProjectId').value;
            const score = document.getElementById('score').value;
            const feedback = document.getElementById('feedback').value;
            const msgEl = document.getElementById('reviewMsg');

            msgEl.innerText = "Submitting review...";

            try {
                const res = await fetch(`${API_URL}/review`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        project_id, 
                        reviewer_id: userWalletAddress,
                        score: parseInt(score),
                        feedback
                    })
                });
                
                const data = await res.json();
                if(res.ok) {
                    msgEl.innerText = data.consensus_reached ? `Review submitted! Consensus reached, Status: ${data.approved ? 'Approved' : 'Rejected'}` : "Review submitted successfully!";
                    setTimeout(() => {
                        modal.style.display = 'none';
                        loadPendingProjects();
                    }, 2000);
                } else {
                    msgEl.innerText = "Error: " + data.error;
                }
            } catch(err) {
                console.error(err);
                msgEl.innerText = "Server error.";
            }
        });
    </script>
</body>
</html>
