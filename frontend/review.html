<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Submissions - Proof of Skill</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar glass">
        <a href="index.html" class="logo">ProofOfSkill</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="submit.html">Submit Work</a>
            <a href="review.html">Review</a>
            <span id="walletStatus" class="mono">Not Connected</span>
            <button class="btn btn-primary" id="connectWalletBtn">Connect Wallet</button>
        </div>
    </nav>
    
    <div class="container">
        <h2>Pending Submissions</h2>
        <p style="color:var(--text-muted); margin-bottom: 2rem;">Review work from your peers. Honest and accurate reviews maintain your reputation score.</p>
        
        <div class="list-view" id="pendingList">
            <!-- Populated via JS -->
        </div>
    </div>

    <!-- Detail Modal Overlay -->
    <div id="reviewModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
        <div class="glass" style="max-width: 800px; width:100%; max-height: 90vh; overflow-y: auto; padding: 3rem; position:relative;">
            <button id="closeModal" style="position:absolute; top:1.5rem; right:1.5rem; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
            
            <div id="projectDetailHeader">
                <h2 id="modalTitle" style="margin-bottom: 0.5rem;">Project Title</h2>
                <p id="modalAuthor" class="mono" style="color: var(--secondary); margin-bottom: 1.5rem;">Author</p>
            </div>

            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                <div>
                    <h4 style="margin-bottom: 0.5rem; text-transform: uppercase; font-size: 0.8rem; color: var(--text-dim);">Description</h4>
                    <p id="modalDescription" style="line-height: 1.6; color: var(--text-main); font-size: 1.05rem;"></p>
                </div>
                <div class="glass" style="padding: 1.5rem;">
                    <h4 style="margin-bottom: 1rem; text-transform: uppercase; font-size: 0.8rem; color: var(--text-dim);">Metadata</h4>
                    <div class="data-row">
                        <span class="data-label">IPFS Hash</span>
                        <span class="data-value" id="modalIpfs" style="font-size: 0.75rem;">-</span>
                    </div>
                </div>
            </div>

            <hr style="border: none; border-top: 1px solid var(--border-light); margin: 2rem 0;">

            <h3 style="margin-bottom: 1.5rem;">Peer Review Verification</h3>
            <form id="reviewForm">
                <input type="hidden" id="modalProjectId">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                    <div>
                        <div class="form-group">
                            <label for="score">Technical Score (1-5)</label>
                            <input type="number" id="score" min="1" max="5" required>
                        </div>
                        <div class="form-group">
                            <label>Are all listed skills legitimate?</label>
                            <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                                    <input type="radio" name="allSkillsVerified" value="yes" checked onclick="toggleSkillSelection(true)"> Yes
                                </label>
                                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                                    <input type="radio" name="allSkillsVerified" value="no" onclick="toggleSkillSelection(false)"> No
                                </label>
                            </div>
                        </div>
                    </div>
                    <div>
                        <div class="form-group" id="manualSkillGroup" style="display: none;">
                            <label>Verify Skills Individually</label>
                            <div id="skillsCheckboxContainer" style="margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.5rem;"></div>
                        </div>
                        <div class="form-group">
                            <label for="feedback">Verification Details / Feedback</label>
                            <textarea id="feedback" rows="4" required placeholder="Explain your verification process..."></textarea>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top: 1rem;">Finalize & Submit Review</button>
            </form>
            <div id="reviewMsg" style="margin-top: 1rem; text-align: center; color: var(--secondary);"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('walletConnected', loadPendingProjects);

        async function loadPendingProjects() {
            try {
                const res = await fetch(`${API_URL}/projects?status=pending`);
                const data = await res.json();
                const list = document.getElementById('pendingList');
                list.innerHTML = '';
                
                if(data.projects && data.projects.length > 0) {
                    data.projects.forEach(p => {
                        if (p.user_id !== userWalletAddress) {
                            const skillsList = p.skills || [p.skill_category];
                            const skillsHtml = skillsList.map(s => `<span class="badge badge-pending" style="margin-right:5px; font-size:0.7rem;">${s}</span>`).join('');
                            
                            const row = document.createElement('div');
                            row.className = 'glass list-item';
                            row.onclick = () => openReviewModal(p);
                            row.innerHTML = `
                                <div class="title">${p.title}</div>
                                <div class="author mono">${p.author_name || p.user_id.substring(0, 10)}... <span style="color:var(--text-dim)">(Rep: ${p.author_rep})</span></div>
                                <div class="skills">${skillsHtml}</div>
                                <div style="text-align: right;"><button class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">View Details</button></div>
                            `;
                            list.appendChild(row);
                        }
                    });
                    if(list.innerHTML === '') list.innerHTML = '<p>No eligible pending projects to review.</p>';
                } else {
                    list.innerHTML = '<p>No pending projects found.</p>';
                }
            } catch(e) {
                console.error(e);
            }
        }

        const modal = document.getElementById('reviewModal');
        const checkboxContainer = document.getElementById('skillsCheckboxContainer');
        const manualSkillGroup = document.getElementById('manualSkillGroup');
        let currentProjectSkills = [];

        window.toggleSkillSelection = (allVerified) => {
            manualSkillGroup.style.display = allVerified ? 'none' : 'block';
        };

        function openReviewModal(project) {
            if(!userWalletAddress) {
                alert("Please connect wallet first.");
                return;
            }
            document.getElementById('modalProjectId').value = project.id;
            document.getElementById('modalTitle').innerText = project.title;
            document.getElementById('modalAuthor').innerText = `Maintained by: ${project.author_name || project.user_id} (Reputation: ${project.author_rep})`;
            document.getElementById('modalDescription').innerText = project.description;
            document.getElementById('modalIpfs').innerText = project.ipfs_hash;
            
            const skills = project.skills || [project.skill_category];
            currentProjectSkills = skills;
            
            // Reset form
            document.getElementById('score').value = '';
            document.getElementById('feedback').value = '';
            document.querySelector('input[name="allSkillsVerified"][value="yes"]').checked = true;
            toggleSkillSelection(true);

            // Populate checkboxes
            checkboxContainer.innerHTML = '';
            skills.forEach(skill => {
                const label = document.createElement('label');
                label.style.display = 'flex';
                label.style.alignItems = 'center';
                label.style.gap = '10px';
                label.style.cursor = 'pointer';
                label.innerHTML = `<input type="checkbox" name="skillCheck" value="${skill}"> ${skill}`;
                checkboxContainer.appendChild(label);
            });

            modal.style.display = 'flex';
        }

        document.getElementById('closeModal').onclick = () => {
            modal.style.display = 'none';
        }

        document.getElementById('reviewForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const project_id = document.getElementById('modalProjectId').value;
            const score = document.getElementById('score').value;
            const feedback = document.getElementById('feedback').value;
            const msgEl = document.getElementById('reviewMsg');

            const allVerified = document.querySelector('input[name="allSkillsVerified"]:checked').value === 'yes';
            const checkedSkills = allVerified 
                ? currentProjectSkills 
                : Array.from(document.querySelectorAll('input[name="skillCheck"]:checked')).map(cb => cb.value);

            if (!allVerified && checkedSkills.length === 0) {
                alert("Please select at least one verified skill if not all are legitimate.");
                return;
            }

            msgEl.innerText = "Submitting review...";

            try {
                const res = await fetch(`${API_URL}/review`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        project_id, 
                        reviewer_id: userWalletAddress,
                        score: parseInt(score),
                        feedback,
                        verified_skills: checkedSkills
                    })
                });
                
                const data = await res.json();
                if(res.ok) {
                    msgEl.innerText = data.consensus_reached ? `Review submitted! Consensus reached, Status: ${data.approved ? 'Approved' : 'Rejected'}` : "Review submitted successfully!";
                    setTimeout(() => {
                        modal.style.display = 'none';
                        loadPendingProjects();
                    }, 2000);
                } else {
                    msgEl.innerText = "Error: " + data.error;
                }
            } catch(err) {
                console.error(err);
                msgEl.innerText = "Server error.";
            }
        });
    </script>
</body>
</html>
